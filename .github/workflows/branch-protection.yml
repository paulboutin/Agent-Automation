name: Branch Protection

on:
  push:
    branches:
      - main
      - development

permissions:
  contents: read
  pull-requests: write

jobs:
  protect-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Protect main branch
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection \
            -X PUT \
            -H "Accept: application/vnd.github.v3+json" \
            -f require_signed_commits=true \
            -f require_up_to_date_baseline=true \
            -f required_status_checks='{"strict": true}' \
            -f enforce_admins=true \
            -f allow_force_pushes=false \
            -f allow_deletions=false || echo "Protection may already exist"
        env:
          GH_TOKEN: ${{ github.token }}

  protect-development:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    steps:
      - name: Protect development branch
        run: |
          gh api repos/${{ github.repository }}/branches/development/protection \
            -X PUT \
            -H "Accept: application/vnd.github.v3+json" \
            -f require_signed_commits=true \
            -f require_up_to_date_baseline=true \
            -f required_status_checks='{"strict": true}' \
            -f enforce_admins=false \
            -f allow_force_pushes=false \
            -f allow_deletions=false || echo "Protection may already exist"
        env:
          GH_TOKEN: ${{ github.token }}