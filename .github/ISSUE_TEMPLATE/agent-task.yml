name: Agent Task
description: Coordinator intake for one automation worker task.
title: "[agent] "
labels:
  - ready
body:
  - type: markdown
    attributes:
      value: |
        Use this template to create one task issue for one automated worker.
        The worker attempts to auto-apply the selected `agent:<lane>` from this form.
        If auto-apply fails, add exactly one `agent:<lane>` label manually.
  - type: dropdown
    id: lane
    attributes:
      label: Agent lane
      description: Pick the lane label to apply.
      options:
        - agent:backend
        - agent:frontend
        - agent:infra
        - agent:docs
        - agent:qa
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Agent role
      description: Choose the agent role for this task.
      options:
        - implementer
        - reviewer
        - planner
        - doc-writer
        - qa-verifier
        - coordinator
        - operator
    validations:
      required: true
  - type: input
    id: base_branch
    attributes:
      label: Base branch
      placeholder: "development"
  - type: input
    id: automation_scope
    attributes:
      label: Automation scope
      placeholder: "feature-auth-refresh"
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: What should be true when this task is complete?
      placeholder: Implement X, add tests Y, update docs Z.
    validations:
      required: true
  - type: textarea
    id: ui_changes
    attributes:
      label: UI/UX Changes Required
      description: For UI/UX work, describe exact changes. Include element names, locations, colors, interactions, before/after states.
      placeholder: "Example for button change:\n- Element: Submit button in top-right of header\n- Before: Blue background, labeled Save\n- After: Green background, labeled Submit\n- Click action: Opens modal dialog"
    validations:
      required: false
  - type: textarea
    id: not_in_scope
    attributes:
      label: NOT in scope
      description: Explicitly list what NOT to change - helps agent avoid gold-plating.
      placeholder: "Example:\n- Do NOT change the login page\n- Do NOT add dark mode toggle"
    validations:
      required: false
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Exact checklist of what must work. One item per line. Be specific.
      placeholder: "Example:\n- [ ] Tab Open shows only open issues\n- [ ] Tab Closed shows only closed issues\n- [ ] Clicking row expands accordion below row\n- [ ] Page title reads Agent Dashboard"
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Files/components allowed, and out-of-scope boundaries.
      placeholder: In-scope files..., out-of-scope files...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Exact commands worker should run before finishing.
      placeholder: |
        ./scripts/validate.sh
        npm test
    validations:
      required: true
  - type: textarea
    id: validation_dependencies
    attributes:
      label: Validation dependencies
      description: Optional shared validation pack names or gating issue refs that should block later sibling work until resolved.
      placeholder: |
        ci
        #123
    validations:
      required: false
  - type: textarea
    id: blockers
    attributes:
      label: Known blockers / decisions
      description: Optional known open decisions.
      placeholder: Any dependency, secret, role, or product decision still pending.
