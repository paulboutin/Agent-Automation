name: Agent Unblocker

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: write

concurrency:
  group: agent-unblocker-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  resolve-blocker:
    if: ${{ github.event.label.name == '{{NEEDS_DECISION_LABEL}}' }}
    runs-on: ubuntu-latest
    steps:
      - name: Gather issue context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 20,
            });
            const recent = comments.slice(-6).map((comment) => `Comment by @${comment.user?.login || 'unknown'}:\n${comment.body || ''}`).join('\n\n---\n\n');
            core.setOutput('decision_input', [
              `Issue #${issue_number}: ${context.payload.issue.title || ''}`,
              '',
              'Issue body:',
              context.payload.issue.body || '(empty)',
              '',
              'Recent comments:',
              recent || '(none)'
            ].join('\n'));

      - name: Run hosted unblocker
        if: ${{ '{{HOSTED_ENABLED}}' == 'true' && '{{DEFAULT_HOST}}' == 'codex' }}
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Summarize the blocker and recommend one concrete next action.

            Context:
            ${{ steps.ctx.outputs.decision_input }}

            Output format:
            RECOMMENDATION: one clear recommendation
            RATIONALE: short reason
            NEXT_ACTION: exact next action

      - name: Publish unblock recommendation
        uses: actions/github-script@v7
        env:
          FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const fallback = [
              'Decision required to continue.',
              '',
              'Use the review pack at `./{{AUTOMATION_ROOT}}/packs/review/prompt.md` to produce a human decision memo.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: process.env.FINAL_MESSAGE || fallback
            });
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['{{DECISION_PROPOSED_LABEL}}'] }).catch(() => {});
            await github.rest.issues.removeLabel({ owner, repo, issue_number, name: '{{NEEDS_DECISION_LABEL}}' }).catch(() => {});
